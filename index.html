<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title></title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      height: 100%;
      background: black;
      overflow: hidden;
      touch-action: manipulation;
    }
    .container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    audio { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <img src="/public/picture.jpg" alt="">
  </div>

  <audio id="sound" loop>
    <source src="/public/sound.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <script>
    const audio = document.getElementById('sound');

    function playSound() {
      audio.volume = 1.0;
      audio.play().catch(() => {});
    }

    // Try immediately
    playSound();

    // Strong tap/click fallback for phones
    const handleTap = () => {
      if (audio.paused) {
        playSound();
      }
    };

    document.addEventListener('touchstart', handleTap, { once: true });
    document.addEventListener('click', handleTap, { once: true });
  </script>
</body>
</html>
