<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title></title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body, html {
      height: 100%;
      background: black;
      overflow: hidden;
      touch-action: manipulation;
    }
    .container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    audio {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Use relative path - files must be in the same folder as index.html -->
    <img src="picture.jpg" alt="">
  </div>

  <!-- Loud sound hosted in your repo -->
  <audio id="sound" loop autoplay>
    <source src="sound.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <script>
    const audio = document.getElementById('sound');

    function startLoudSound() {
      audio.volume = 1.0;
      const playPromise = audio.play();
      if (playPromise !== undefined) {
        playPromise.catch(() => {
          // Autoplay blocked - waiting for user tap
        });
      }
    }

    // Try to start immediately
    startLoudSound();

    // Important for phones: start on first tap/touch
    let hasInteracted = false;
    const handleInteraction = () => {
      if (!hasInteracted && audio.paused) {
        hasInteracted = true;
        audio.volume = 1.0;
        audio.play();
      }
    };

    document.addEventListener('touchstart', handleInteraction, { once: true });
    document.addEventListener('click', handleInteraction, { once: true });
  </script>
</body>
</html>
