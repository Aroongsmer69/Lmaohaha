<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title></title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html {
      height: 100%;
      background: black;
      overflow: hidden;
      touch-action: manipulation;
    }
    .container {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    audio { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <img src="https://i.ibb.co/1J9fMT5m/picture.jpg" alt="">
  </div>

  <audio id="sound" loop preload="auto">
    <source src="https://files.catbox.moe/dz5zfl.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <script>
    const audio = document.getElementById('sound');

    function playLoudSound() {
      audio.volume = 1.0;           // Max volume
      const promise = audio.play();
      if (promise !== undefined) {
        promise.catch(err => {
          console.log("Play blocked:", err);
        });
      }
    }

    // Try once on load (won't work on most phones)
    playLoudSound();

    // Strong interaction handler - works on touch and click
    let hasPlayed = false;

    const forcePlay = () => {
      if (!hasPlayed) {
        hasPlayed = true;
        playLoudSound();
      }
    };

    // Multiple events for best phone compatibility
    document.addEventListener('touchstart', forcePlay, { once: true });
    document.addEventListener('click', forcePlay, { once: true });
    document.addEventListener('touchend', forcePlay, { once: true });
  </script>
</body>
</html>
